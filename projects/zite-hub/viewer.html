<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PWA Viewer</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <iframe id="target-frame" src=""></iframe>

    <script>
        // Get the URL from the address bar (e.g., viewer.html?url=https://latenode.com)
        const params = new URLSearchParams(window.location.search);
        const targetUrl = params.get('url');
        if (targetUrl) {
            document.getElementById('target-frame').src = targetUrl;
        }
    </script>
</body>
</html>
