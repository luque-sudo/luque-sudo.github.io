<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA Hub</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --sidebar-width: 260px; }
        body { background-color: #f9fafb; }
        .sidebar { width: var(--sidebar-width); height: 100vh; position: fixed; border-right: 1px solid #e5e7eb; }
        .main-content { margin-left: var(--sidebar-width); padding: 2rem; }
        .nav-link { 
            display: flex; align-items: center; padding: 0.75rem 1rem; 
            border-radius: 0.5rem; transition: all 0.2s; color: #4b5563;
        }
        .nav-link:hover { background-color: #f3f4f6; color: #111827; }
    </style>
</head>
<body>

    <aside class="sidebar bg-white p-4">
        <div class="flex items-center gap-3 mb-8 px-2">
            <div class="w-8 h-8 bg-indigo-600 rounded-lg"></div>
            <span class="font-bold text-xl tracking-tight">PWA Hub</span>
        </div>

        <nav class="space-y-1">
            <p class="text-xs font-semibold text-gray-400 uppercase px-2 mb-2">Predefined Apps</p>
            
            <a href="https://build.fillout.com/" target="_blank" class="nav-link">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                Fillout Builder
            </a>

            <a href="https://app.latenode.com/" target="_blank" class="nav-link">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                Latenode App
            </a>

            <a href="https://youtube.com" target="_blank" class="nav-link">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                YouTube
            </a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Welcome to your Dashboard</h1>
            <p class="text-gray-500">Select a tool from the sidebar to open it in a new tab within this window.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                <h3 class="font-semibold text-lg mb-2">Quick Tip</h3>
                <p class="text-gray-600 text-sm">Because this is a PWA in <strong>Tabbed Mode</strong>, your links won't kick you out to a browser; they stay organized right here.</p>
            </div>
        </div>
    </main>

    <script>
        // Register the Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
